<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dragon Ball Z</title>
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body>

    <!-- Navigatie bovenaan -->
    <nav id="navigatie">
      <h1 id="site-titel">Dragon Ball Z</h1>

      <div id="zoek-sectie">
        <input type="text" id="zoekbalk" placeholder="Zoek een character..." />
        <button id="zoek-knop">Zoek</button>
        <span id="zoek-fout" class="fout-melding"></span>
      </div>

      <div id="filter-sectie">
        <select id="ras-filter">
          <option value="">Alle rassen</option>
          <option value="Saiyan">Saiyan</option>
          <option value="Namekian">Namekian</option>
          <option value="Android">Android</option>
          <option value="Frieza Race">Frieza Race</option>
          <option value="Human">Human</option>
          <option value="God">God</option>
          <option value="Majin">Majin</option>
        </select>

        <select id="sorteer-select">
          <option value="">Sorteer op...</option>
          <option value="naam-az">Naam (A-Z)</option>
          <option value="naam-za">Naam (Z-A)</option>
          <option value="ki-laag">Power Level (laag → hoog)</option>
          <option value="ki-hoog">Power Level (hoog → laag)</option>
        </select>
      </div>

      <div id="weergave-knoppen">
        <button id="kaarten-knop">Kaarten</button>
        <button id="tabel-knop">Tabel</button>
      </div>
    </nav>

    <!-- Hoofdinhoud -->
    <main id="inhoud">

      <!-- Kaarten weergave -->
      <div id="kaarten-weergave"></div>

      <!-- Tabel weergave -->
      <div id="tabel-weergave" class="verborgen">
        <table id="characters-tabel">
          <thead>
            <tr>
              <th>Foto</th>
              <th>Naam</th>
              <th>Ras</th>
              <th>Geslacht</th>
              <th>Ki</th>
              <th>Max Ki</th>
              <th>Affiliation</th>
              <th>Favoriet</th>
            </tr>
          </thead>
          <tbody id="tabel-body"></tbody>
        </table>
      </div>

    </main>

    <!-- Favorieten sectie onderaan -->
    <section id="favoriten-sectie">
      <h2 id="favoriten-titel">Mijn Favorieten</h2>
      <div id="favoriten-lijst">
        <p id="geen-favorieten">Nog geen favorieten opgeslagen.</p>
      </div>
    </section>

    <!-- Detail popup -->
    <div id="detail-modal" class="verborgen">
      <div id="modal-inhoud">
        <button id="sluit-modal">X</button>
        <div id="modal-data"></div>
      </div>
    </div>

    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
